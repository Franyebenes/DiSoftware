<div class="page-container">

  <!-- CABECERA -->
  <div class="header-wrapper">
    <div class="header-inner">
      <span class="logo-text" (click)="irAlLogin()" style="cursor:pointer">esientradas</span>
    </div>
  </div>

  <!-- TARJETA CENTRAL -->
  <div class="card-wrapper">
    <div class="reset-card">

      <h2 class="titulo">Nueva contraseña</h2>
      <p class="subtitulo">Introduce y confirma tu nueva contraseña.</p>

      <!-- TOKEN INVÁLIDO -->
      <div class="alert alert-error" *ngIf="!token">
        Token no válido o caducado. Solicita un nuevo enlace de recuperación.
      </div>

      <!-- FORMULARIO -->
      <div *ngIf="token && !resetDone">

        <div class="input-group">
          <label>Nueva contraseña</label>
          <div class="password-container">
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="newPassword"
              placeholder="Mín. 8 caracteres, mayús, número, símbolo">
            <button type="button" class="eye-btn" (click)="togglePassword()" [title]="showPassword ? 'Ocultar' : 'Mostrar'">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="input-group">
          <label>Confirmar contraseña</label>
          <div class="password-container">
            <input
              [type]="showConfirm ? 'text' : 'password'"
              [(ngModel)]="confirmPassword"
              placeholder="Repite la contraseña">
            <button type="button" class="eye-btn" (click)="toggleConfirm()" [title]="showConfirm ? 'Ocultar' : 'Mostrar'">
              <svg *ngIf="!showConfirm" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showConfirm" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button class="btn-primary" (click)="reset()">Cambiar contraseña</button>

      </div>

      <!-- ÉXITO -->
      <div *ngIf="resetDone">
        <div class="alert alert-success">{{ successMessage }}</div>
      </div>

      <div class="footer-link">
        <a (click)="irAlLogin()">← Volver al login</a>
      </div>

    </div>
  </div>
</div>
