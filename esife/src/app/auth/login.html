<div class="login-page">
  <div class="login-card">
    <!-- LOGIN FORM -->
    <div *ngIf="!showRegister">
      <div class="login-header">
        <h2>Identifícate</h2>
        <p>Necesitas iniciar sesión para comprar entradas</p>
      </div>

      <div class="login-body">
        <div class="input-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com">
        </div>

        <div class="input-group">
          <label>Contraseña</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••">
        </div>

        <button class="btn-login" (click)="login()">
          Entrar ahora
        </button>

        <p *ngIf="errorMessage" class="error-msg">
          {{ errorMessage }}
        </p>
      </div>
      
      <div class="login-footer">
        <p>¿No tienes cuenta? <a href="javascript:void(0)" (click)="toggleRegister()">Regístrate aquí</a></p>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div *ngIf="showRegister">
      <div class="login-header">
        <h2>Crea tu cuenta</h2>
        <p>Regístrate para empezar a comprar entradas</p>
      </div>

      <div class="login-body">
        <div class="input-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="registerEmail" name="registerEmail" placeholder="tu@email.com">
        </div>

        <div class="input-group">
          <label>Contraseña</label>
          <input type="password" [(ngModel)]="registerPassword1" name="registerPassword1" 
                 placeholder="Mínimo 8 caracteres: mayús, minús, número, carácter especial">
        </div>

        <div class="input-group">
          <label>Confirmar contraseña</label>
          <input type="password" [(ngModel)]="registerPassword2" name="registerPassword2" placeholder="••••••••">
        </div>

        <button class="btn-login" (click)="register()">
          Registrarse
        </button>

        <p *ngIf="registerErrorMessage" class="error-msg">
          {{ registerErrorMessage }}
        </p>

        <p *ngIf="registerSuccessMessage" class="success-msg">
          {{ registerSuccessMessage }}
        </p>
      </div>
      
      <div class="login-footer">
        <p>¿Ya tienes cuenta? <a href="javascript:void(0)" (click)="toggleRegister()">Inicia sesión aquí</a></p>
      </div>
    </div>
  </div>
</div>
